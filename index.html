<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>City Social App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- FONT AWESOME -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">CityLife</div>

        <div class="nav-icons">

            <!-- SPA NAVIGATION -->
            <i class="fa-solid fa-house" onclick="location.hash='home'"></i>

            <i class="fa-solid fa-map" onclick="location.hash='explore'"></i>

            <i class="fa-solid fa-bell" onclick="location.hash='notifications'"></i>

            <i class="fa-solid fa-user" onclick="location.hash='perfil'"></i>

        </div>
    </nav>

    <!-- CONTENEDOR SPA -->
    <main id="app"></main>

    <!-- MOBILE NAVIGATION -->
    <nav class="mobile-nav">

        <div class="mobile-item" onclick="location.hash='home'">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </div>

        <div class="mobile-item" onclick="location.hash='explore'">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>Mapa</span>
        </div>

        <!-- ESTE BOTÓN NO CAMBIA DE PÁGINA (lo puedes usar después para crear posts) -->
        <div class="mobile-item center-button">
            <i class="fa-solid fa-plus"></i>
        </div>

        <div class="mobile-item" onclick="location.hash='eventos'">
            <i class="fa-solid fa-calendar"></i>
            <span>Eventos</span>
        </div>

        <div class="mobile-item" onclick="location.hash='perfil'">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </div>

    </nav>

    <!-- SCRIPTS (ORDEN IMPORTANTE) -->
    <script src="js/navigation.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
